<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ArchaeoSmart</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6c4b2a">

<link rel="stylesheet" href="./style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<!-- FLOATING ARCHAEOLOGY BACKGROUND -->
<div id="bgLayer"></div>

<div class="app">

<header>

<button class="homeBtn" onclick="showHome()">🏠</button>

<h1>ArchaeoSmart</h1>

<div id="appVersion">v2.3.2</div>

</header>


<!-- HOME -->

<div id="homeScreen" class="screen">

<button class="mainButton" onclick="showArtifact()">New Artifact</button>

<button class="mainButton" onclick="showDatabase()">Artifact Database</button>

<button class="mainButton" onclick="startScanner()">Scan QR</button>

<button class="mainButton" onclick="showMap()">Artifact Map</button>

</div>



<!-- CREATE ARTIFACT -->

<div id="artifactScreen" class="screen hidden">

<h2>Artifact Record</h2>

<div class="card">

<label>Site</label>
<input id="site" placeholder="Site name">

<label>Artifact Type</label>
<select id="type">
<option>Ceramic</option>
<option>Bone</option>
<option>Metal</option>
<option>Stone</option>
</select>

<label>Depth (cm)</label>
<input id="depth" placeholder="Depth">

</div>



<div class="card">

<h3>QR Code</h3>
<div id="qrcode"></div>

</div>



<div class="card">

<h3>Location</h3>

<p id="gps">Not recorded</p>

<button class="secondaryBtn" onclick="getLocation()">Get GPS</button>

</div>



<div class="card">

<h3>Date</h3>
<p id="date"></p>

</div>



<div class="card">

<h3>Voice to Text (Beta)</h3>

<div class="voiceControls">

<button onclick="startDictation()">Start</button>
<button onclick="stopDictation()">Stop</button>

</div>

<textarea id="voiceText"></textarea>

</div>



<div class="card">

<h3>Voice Memo</h3>

<div class="voiceControls">

<button onclick="startRecording()">Record</button>
<button onclick="stopRecording()">Stop</button>

</div>

<audio id="audioPlayback" controls></audio>

</div>



<div class="card">

<h3>Photo</h3>

<input type="file" accept="image/*" id="photo">

<img id="preview">

</div>



<div class="card">

<h3>Drawing</h3>

<canvas id="canvas"></canvas>

<div class="drawingControls">

<label>Brush</label>
<input type="range" min="1" max="20" value="3"
oninput="currentBrush=this.value">

<label>Opacity</label>
<input type="range" min="0.1" max="1" step="0.1" value="1"
oninput="currentOpacity=this.value">

<label>Color</label>
<input type="color"
oninput="currentColor=this.value">

</div>

<button class="secondaryBtn" onclick="clearCanvas()">Clear</button>

<button class="secondaryBtn" onclick="openCanvasFullscreen()">Fullscreen</button>

</div>



<div class="card">

<h3>Notes</h3>

<textarea id="notes"></textarea>

</div>


<button class="save" onclick="saveArtifact()">Save Artifact</button>

</div>



<!-- DATABASE -->

<div id="databaseScreen" class="screen hidden">

<h2>Artifact Database</h2>

<input id="searchID" placeholder="Search by Artifact ID">

<button class="secondaryBtn" onclick="searchArtifact()">Search</button>

<button class="secondaryBtn" onclick="exportCSV()">Export CSV</button>

<div id="artifactList"></div>

</div>



<!-- DETAIL -->

<div id="detailScreen" class="screen hidden">

<h2>Artifact Details</h2>

<div id="artifactDetail"></div>

</div>



<!-- MAP -->

<div id="mapScreen" class="screen hidden">

<h2>Artifact Map</h2>

<div id="map"></div>

</div>



<!-- QR SCANNER -->

<div id="scannerScreen" class="screen hidden">

<h2>Scan Artifact</h2>

<div id="reader"></div>

</div>



<!-- FULLSCREEN CANVAS -->

<div id="canvasFullscreen" class="hidden">

<button class="closeCanvasBtn" onclick="closeCanvasFullscreen()">Close</button>

<canvas id="canvasFull"></canvas>

<button class="clearCanvasBtn" onclick="clearCanvasFull()">Clear</button>

</div>


</div>

<script src="./app.js"></script>

<script>

if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("sw.js")
.then(() => console.log("Service Worker Registered"));

}

</script>

</body>

</html>
